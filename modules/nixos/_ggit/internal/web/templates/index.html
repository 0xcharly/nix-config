{{define "content"}}
  <section
    class="rounded-3xl border border-zinc-800/80 bg-zinc-900/60 p-4 shadow-2xl shadow-black/30 backdrop-blur-md"
  >
    <input
      id="filter"
      type="text"
      autocomplete="off"
      spellcheck="false"
      placeholder="filter this page&hellip;"
      class="w-full max-w-sm rounded-2xl border border-zinc-700/80 bg-zinc-950/60 px-4 py-2 font-mono text-sm text-zinc-100 outline-none transition focus:border-blue-400/70 focus:ring-4 focus:ring-blue-500/10"
    />
  </section>

  {{range .Sections}}
    <section
      data-owner
      class="rounded-3xl border border-zinc-800/80 bg-zinc-900/60 p-5 shadow-2xl shadow-black/30 backdrop-blur-md"
    >
      <h2 class="mb-4 inline-flex rounded-full border border-blue-400/20 bg-blue-400/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-blue-200">
        {{.Owner}}
      </h2>
      <table class="w-full text-left text-sm">
        <thead>
          <tr class="text-xs uppercase tracking-[0.15em] text-zinc-500">
            <th class="pb-2 pr-4 font-medium">name</th>
            <th class="pb-2 pr-4 font-medium">description</th>
            <th class="pb-2 font-medium">idle</th>
          </tr>
        </thead>
        <tbody>
          {{range .Repos}}
            <tr data-repo="{{.FullName}}" class="border-b border-zinc-800/60 last:border-0">
              <td class="py-2 pr-4">
                <a class="text-blue-200 hover:underline" href="{{.URL}}">{{.Name}}</a>
              </td>
              <td class="py-2 pr-4 text-zinc-400">{{.Description}}</td>
              <td class="whitespace-nowrap py-2 font-mono text-zinc-400">{{reltime .Updated}}</td>
            </tr>
          {{end}}
        </tbody>
      </table>
    </section>
  {{end}}

  {{if or .PrevURL .NextURL}}
    <div class="flex justify-between font-mono text-sm">
      <span>
        {{if .PrevURL}}<a class="text-blue-200 hover:underline" href="{{.PrevURL}}">[prev]</a>{{end}}
      </span>
      <span>
        {{if .NextURL}}<a class="text-blue-200 hover:underline" href="{{.NextURL}}">[next]</a>{{end}}
      </span>
    </div>
  {{end}}

  <script>
    (function () {
      var input = document.getElementById("filter");
      if (!input) return;
      input.addEventListener("input", function () {
        var q = input.value.toLowerCase();
        document.querySelectorAll("[data-repo]").forEach(function (el) {
          el.classList.toggle("hidden", el.dataset.repo.toLowerCase().indexOf(q) === -1);
        });
        document.querySelectorAll("section[data-owner]").forEach(function (sec) {
          sec.classList.toggle("hidden", !sec.querySelector("[data-repo]:not(.hidden)"));
        });
      });
    })();
  </script>
{{end}}

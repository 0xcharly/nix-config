{{define "content"}}
  <section
    class="rounded-3xl border border-zinc-800/80 bg-zinc-900/60 p-5 shadow-2xl shadow-black/30 backdrop-blur-md"
  >
    <h2 class="mb-4 text-xs font-semibold uppercase tracking-[0.2em] text-zinc-500">
      Log <span class="ml-2 font-mono normal-case tracking-normal text-blue-200">{{.RefName}}</span>
    </h2>
    {{if .Commits}}
      <table class="w-full text-left text-sm">
        <thead>
          <tr class="text-xs uppercase tracking-[0.15em] text-zinc-500">
            <th class="pb-2 pr-4 font-medium">age</th>
            <th class="pb-2 pr-4 font-medium">commit</th>
            <th class="pb-2 font-medium">author</th>
          </tr>
        </thead>
        <tbody>
          {{range .Commits}}
            <tr class="border-b border-zinc-800/60 last:border-0">
              <td class="whitespace-nowrap py-2 pr-4 font-mono text-zinc-400">{{reltime .Time}}</td>
              <td class="w-full max-w-0 py-2 pr-4">
                <a class="block truncate text-zinc-200 hover:text-blue-200 hover:underline" href="{{.CommitURL}}" title="{{.Subject}}">{{.Subject}}</a>
              </td>
              <td class="whitespace-nowrap py-2 text-zinc-400">{{.Author}}</td>
            </tr>
          {{end}}
        </tbody>
      </table>
    {{else}}
      <p class="py-4 text-center text-sm text-zinc-500">No commits.</p>
    {{end}}
  </section>

  {{if or .PrevURL .NextURL}}
    <div class="flex justify-between font-mono text-sm">
      <span>
        {{if .PrevURL}}<a class="text-blue-200 hover:underline" href="{{.PrevURL}}">[prev]</a>{{end}}
      </span>
      <span>
        {{if .NextURL}}<a class="text-blue-200 hover:underline" href="{{.NextURL}}">[next]</a>{{end}}
      </span>
    </div>
  {{end}}
{{end}}
